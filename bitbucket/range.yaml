apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: range-discovery
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  syncPolicy: 
    automated: 
      prune: true
    syncOptions:
      - CreateNamespace=true
  destination:
    namespace: range-discovery
    server: https://kubernetes.default.svc
  project: default
  source:
    path: range
    repoURL: https://github.com/cuotos/k8stest
    targetRevision: kind
