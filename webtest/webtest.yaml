apiVersion: apps/v1
kind: Deployment
metadata:
  name: webtest
  labels:
    app: webtest
    env: staging
spec:
  selector:
    matchLabels:
      app: webtest
      env: staging
  replicas: 1
  template:
    metadata:
      labels:
        app: webtest
        env: staging
    spec:
      containers:
        - name: web
          image: cuotos/webtester
          ports:
            - name: http
              containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: webtest
spec:
  selector:
    app: webtest
    env: staging
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webtest
  #annotations:
  #  nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: web.dev.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webtest
                port:
                  name: http
