apiVersion: apps/v1
kind: Deployment
metadata:
  name: website-server
  labels:
    app: website-server
spec:
  selector:
    matchLabels:
      app: website-server
  replicas: 3
  template:
    metadata:
      labels:
        app: website-server
      annotations:
        prometheus.io/scrape: "true"
    spec:
      containers:
        - name: web
          image: cuotos/webtester:4
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5117
      serviceAccountName: website
---
apiVersion: v1
kind: Service
metadata:
  name: website-server
spec:
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app: website-server
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: website
spec:
  ingressClassName: nginx
  rules:
  - host: test.dev.localhost
    http:
      paths:
      - pathType: Prefix
        path: /
        backend:
          service:
            name: website-server
            port:
              number: 80
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: website
  
